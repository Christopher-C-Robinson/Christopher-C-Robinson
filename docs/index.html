<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bingo Privacy Policy</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #5f6b7a;
      --accent: #0f766e;
      --border: #d8e1e8;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Bingo Privacy Policy</h1>
      <p>This site hosts the public privacy policy for the Bingo app.</p>
      <p><a href="./privacy-policy/">Open the privacy policy</a></p>
    </section>
  </main>
</body>
</html>
